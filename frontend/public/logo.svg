<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1976D2" opacity="0.1" stroke="#1976D2" stroke-width="2"/>
  
  <!-- Main circle background -->
  <circle cx="100" cy="100" r="80" fill="#1976D2"/>
  
  <!-- Letter K -->
  <text x="50" y="130" font-size="60" font-weight="bold" font-family="Arial, sans-serif" fill="white">K</text>
  
  <!-- Letter K (second) -->
  <text x="90" y="130" font-size="60" font-weight="bold" font-family="Arial, sans-serif" fill="white">K</text>
  
  <!-- Letter C -->
  <text x="130" y="130" font-size="60" font-weight="bold" font-family="Arial, sans-serif" fill="white">C</text>
  
  <!-- Letter W -->
  <text x="160" y="130" font-size="60" font-weight="bold" font-family="Arial, sans-serif" fill="white">W</text>
  
  <!-- Decorative line -->
  <line x1="30" y1="160" x2="170" y2="160" stroke="#1976D2" stroke-width="3"/>
</svg>
